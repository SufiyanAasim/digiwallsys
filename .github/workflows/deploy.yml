name: Deployment candidate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: docker build --tag digiwallsys-api:candidate .
      - run: echo "Configure a provider-specific deployment only after production gates in docs/deployment/Deployment.md are satisfied."
