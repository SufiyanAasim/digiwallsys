name: Dependency status

on:
  workflow_dispatch:
  schedule:
    - cron: "41 4 * * 1"

permissions:
  contents: read

jobs:
  status:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm outdated
