name: Test

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: digiwallsys_test
          POSTGRES_USER: digiwallsys
          POSTGRES_PASSWORD: digiwallsys
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U digiwallsys -d digiwallsys_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://digiwallsys:digiwallsys@127.0.0.1:5432/digiwallsys_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
