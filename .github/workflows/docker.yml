name: Docker

on:
  pull_request:
    paths:
      - Dockerfile
      - docker-compose.yml
      - src/backend/**
      - config/**
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: digiwallsys-api:ci
