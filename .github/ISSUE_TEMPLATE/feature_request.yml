name: Feature request
description: Propose a focused product improvement.
title: "feat: "
labels: [feature]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem needs to be solved?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and tradeoffs
