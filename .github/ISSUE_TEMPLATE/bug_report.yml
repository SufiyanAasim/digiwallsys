name: Bug report
description: Report reproducible incorrect behavior.
title: "fix: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Remove secrets, tokens, and personal data before submitting.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node, device/emulator, and database versions.
    validations:
      required: true
